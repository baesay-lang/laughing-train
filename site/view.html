<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>문서 보기</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📄</text></svg>">
<link rel="stylesheet" href="style.css">
<style>
  .doc-wrap { max-width: 820px; margin: 0 auto; padding: 28px 20px 80px; }
  .doc-nav { margin-bottom: 18px; font-size: .88rem; }
  .doc-nav a { color: var(--accent); text-decoration: none; }
  .doc {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 34px 38px; box-shadow: var(--shadow);
    overflow-wrap: break-word;
  }
  .doc img { max-width: 100%; }
  .doc pre { overflow-x: auto; background: var(--bg); padding: 12px 14px; border-radius: 8px; }
  .doc code { background: var(--bg); padding: 1px 5px; border-radius: 4px; font-size: .9em; }
  .doc pre code { background: none; padding: 0; }
  .doc table { border-collapse: collapse; display: block; overflow-x: auto; }
  .doc th, .doc td { border: 1px solid var(--border); padding: 6px 12px; }
  .doc blockquote { border-left: 3px solid var(--accent); margin-left: 0; padding-left: 16px; color: var(--text-dim); }
  .doc a { color: var(--accent); }
</style>
</head>
<body>
<div class="doc-wrap">
  <nav class="doc-nav"><a href="index.html">← 아카이브로 돌아가기</a></nav>
  <article id="doc" class="doc"><p>불러오는 중…</p></article>
</div>
<script src="marked.min.js"></script>
<script>
(async function () {
  const doc = document.getElementById("doc");
  const path = new URLSearchParams(location.search).get("f");
  if (!path || path.includes("..") || !path.startsWith("works/")) {
    doc.innerHTML = "<p>잘못된 문서 경로입니다.</p>";
    return;
  }
  try {
    const res = await fetch(path);
    if (!res.ok) throw new Error(res.status);
    const text = await res.text();
    document.title = path.split("/").pop() + " · 문서 보기";
    if (window.marked) {
      // 상대경로 이미지/링크가 문서 폴더 기준으로 열리도록 base 지정
      const base = document.createElement("base");
      base.href = path.substring(0, path.lastIndexOf("/") + 1);
      const container = document.createElement("div");
      container.innerHTML = marked.parse(text);
      container.querySelectorAll("img, a").forEach(el => {
        const attr = el.tagName === "IMG" ? "src" : "href";
        const v = el.getAttribute(attr);
        if (v && !/^([a-z]+:|\/|#)/i.test(v)) el.setAttribute(attr, base.href + v);
      });
      doc.innerHTML = "";
      doc.append(...container.childNodes);
    } else {
      const pre = document.createElement("pre");
      pre.textContent = text;
      doc.innerHTML = "";
      doc.appendChild(pre);
    }
  } catch (e) {
    doc.innerHTML = "<p>문서를 불러오지 못했습니다 (" + e.message + ")</p>";
  }
})();
</script>
</body>
</html>
